<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Ahorros - Ciberpunk</title>
    <style>
        :root {
            --bg-principal: #0a0a0c;
            --bg-tarjeta: #121216;
            --neon-verde: #00ff66;
            --neon-rojo: #ff3366;
            --neon-azul: #00f0ff;
            --texto: #e2e8f0;
            --texto-oscuro: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Reloj Ciberpunk Flotante Fijo */
        #reloj-cyberpunk {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(18, 18, 22, 0.85);
            border: 1px solid var(--neon-azul);
            padding: 8px 12px;
            border-radius: 4px;
            text-align: right;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            z-index: 9999;
            pointer-events: none;
        }
        #reloj-cyberpunk .hora {
            font-size: 1.1rem;
            color: var(--neon-azul);
            font-weight: bold;
            text-shadow: 0 0 5px var(--neon-azul);
        }
        #reloj-cyberpunk .fecha {
            font-size: 0.75rem;
            color: var(--texto-oscuro);
        }
        #reloj-cyberpunk .status {
            font-size: 0.65rem;
            color: var(--neon-verde);
            letter-spacing: 1px;
        }

        .contenedor {
            width: 100%;
            max-width: 900px;
            background: var(--bg-tarjeta);
            border: 2px solid #1e1e24;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        h1, h2 {
            color: var(--texto);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid #1e1e24;
            padding-bottom: 10px;
        }

        h1 span { color: var(--neon-azul); }

        .oculto { display: none !important; }

        /* Formularios */
        .grupo-input {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: var(--texto-oscuro);
            text-transform: uppercase;
        }
        input, select {
            width: 100%;
            background: #1a1a22;
            border: 1px solid #2d2d3a;
            padding: 10px;
            color: var(--texto);
            border-radius: 4px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: var(--neon-azul);
            box-shadow: 0 0 5px rgba(0, 240, 255, 0.3);
        }

        /* Botones */
        button {
            width: 100%;
            background: transparent;
            border: 1px solid var(--neon-azul);
            color: var(--neon-azul);
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            margin-top: 10px;
        }
        button:hover {
            background: var(--neon-azul);
            color: #000;
            box-shadow: 0 0 10px var(--neon-azul);
        }
        .btn-logout {
            border-color: var(--neon-rojo);
            color: var(--neon-rojo);
            margin-top: 20px;
        }
        .btn-logout:hover {
            background: var(--neon-rojo);
            color: #000;
            box-shadow: 0 0 10px var(--neon-rojo);
        }

        /* Dashboard */
        .grid-dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-dashboard { grid-template-columns: 1fr; }
            #reloj-cyberpunk .fecha, #reloj-cyberpunk .status { display: none; }
            #reloj-cyberpunk { top: 5px; right: 5px; padding: 4px 8px; }
            #reloj-cyberpunk .hora { font-size: 0.9rem; }
        }

        .balance-box {
            background: #16161e;
            border-left: 4px solid var(--neon-azul);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .balance-box h3 { font-size: 0.9rem; color: var(--texto-oscuro); text-transform: uppercase; }
        .balance-box p { font-size: 1.8rem; font-weight: bold; margin-top: 5px; color: var(--neon-verde); }

        /* Historial en Grilla Fija y Centrada */
        .lista-movimientos {
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .item-movimiento {
            display: grid;
            grid-template-columns: 1fr 90px 100px;
            align-items: center;
            background: #16161e;
            padding: 10px;
            border-bottom: 1px solid #2d2d3a;
            font-size: 0.85rem;
            gap: 10px;
        }
        .item-movimiento .desc {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-movimiento .monto {
            text-align: right;
            font-weight: bold;
        }
        .item-movimiento .monto.ingreso { color: var(--neon-verde); }
        .item-movimiento .monto.gasto { color: var(--neon-rojo); }
        .item-movimiento .fecha-item {
            color: var(--texto-oscuro);
            text-align: center;
        }

        .error-msg {
            color: var(--neon-rojo);
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="reloj-cyberpunk">
        <div class="hora" id="cyber-hora">00:00:00</div>
        <div class="fecha" id="cyber-fecha">00/00/2026</div>
        <div class="status">SYS_STATUS: OK</div>
    </div>

    <div class="contenedor">
        <div id="seccion-auth">
            <h1 id="auth-titulo"><span>//</span> INICIAR SESIÓN</h1>
            <form id="form-auth">
                <div class="grupo-input">
                    <label>Usuario</label>
                    <input type="text" id="auth-username" required autocomplete="username">
                </div>
                <div class="grupo-input">
                    <label>Contraseña</label>
                    <input type="password" id="auth-password" required autocomplete="current-password">
                </div>
                <button type="submit" id="btn-auth-enviar">Ingresar</button>
            </form>
            <button id="btn-toggle-auth" style="border-color: var(--texto-oscuro); color: var(--texto-oscuro); font-size: 0.75rem;">¿No tenés cuenta? Registrate acá</button>
            <div id="auth-error" class="error-msg"></div>
        </div>

        <div id="seccion-app" class="oculto">
            <h1><span>//</span> PANEL DE CONTROL</h1>
            
            <div class="balance-box">
                <h3>Balance Total</h3>
                <p id="balance-monto">$0.00</p>
            </div>

            <div class="grid-dashboard">
                <div>
                    <h2>Nuevo Movimiento</h2>
                    <form id="form-movimiento">
                        <div class="grupo-input">
                            <label>Descripción</label>
                            <input type="text" id="mov-descripcion" required placeholder="Ej: Nafta Boxer">
                        </div>
                        <div class="grupo-input">
                            <label>Monto ($)</label>
                            <input type="number" step="0.01" id="mov-monto" required placeholder="0.00">
                        </div>
                        <div class="grupo-input">
                            <label>Tipo</label>
                            <select id="mov-tipo">
                                <option value="ingreso">Ingreso (Ahorro / Sueldo)</option>
                                <option value="gasto">Gasto</option>
                            </select>
                        </div>
                        <button type="submit" id="btn-guardar-movimiento">Guardar Movimiento</button>
                    </form>
                    <div id="mov-error" class="error-msg"></div>
                </div>

                <div>
                    <h2>Historial</h2>
                    <div class="item-movimiento" style="background: transparent; border-bottom: 2px solid var(--neon-azul); font-weight: bold; color: var(--neon-azul);">
                        <div>Detalle</div>
                        <div style="text-align: right;">Monto</div>
                        <div style="text-align: center;">Fecha</div>
                    </div>
                    <div class="lista-movimientos" id="contenedor-movimientos">
                        </div>
                </div>
            </div>

            <button id="btn-logout" class="btn-logout">Desconectarse del sistema</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE URLS DE PRODUCCIÓN (RENDER)
        const API_BASE_URL = "https://gestor-ahorros-backend.onrender.com/api";
        
        let modoLogin = true;

        // --- RELOJ DINÁMICO CIBERPUNK ---
        function actualizarReloj() {
            const ahora = new Date();
            
            // Hora
            const hrs = String(ahora.getHours()).padStart(2, '0');
            const mins = String(ahora.getMinutes()).padStart(2, '0');
            const secs = String(ahora.getSeconds()).padStart(2, '0');
            document.getElementById('cyber-hora').textContent = `${hrs}:${mins}:${secs}`;
            
            // Fecha formato Argentino (DD/MM/AAAA)
            const dia = String(ahora.getDate()).padStart(2, '0');
            const mes = String(ahora.getMonth() + 1).padStart(2, '0');
            const anio = ahora.getFullYear();
            document.getElementById('cyber-fecha').textContent = `${dia}/${mes}/${anio}`;
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // --- PING AUTOMÁTICO PARA DESPERTAR A RENDER ---
        async function despertarServidor() {
            const btnAuth = document.getElementById('btn-auth-enviar');
            const textoOriginal = btnAuth.textContent;
            btnAuth.textContent = "CONECTANDO SERVIDOR...";
            btnAuth.disabled = true;
            
            try {
                // Hacemos una petición rápida al endpoint de movimientos (va a dar 401 pero despierta al server)
                await fetch(`${API_BASE_URL}/movimientos/`);
            } catch (e) {
                console.log("Despertando servidor...");
            } finally {
                btnAuth.textContent = textoOriginal;
                btnAuth.disabled = false;
            }
        }
        // Se ejecuta apenas abre la página
        despertarServidor();

        // --- MANEJO DE PASO ENTRE LOGIN Y REGISTRO ---
        document.getElementById('btn-toggle-auth').addEventListener('click', () => {
            modoLogin = !modoLogin;
            const titulo = document.getElementById('auth-titulo');
            const btnEnviar = document.getElementById('btn-auth-enviar');
            const btnToggle = document.getElementById('btn-toggle-auth');
            
            if (modoLogin) {
                titulo.innerHTML = "<span>//</span> INICIAR SESIÓN";
                btnEnviar.textContent = "Ingresar";
                btnToggle.textContent = "¿No tenés cuenta? Registrate acá";
            } else {
                titulo.innerHTML = "<span>//</span> REGISTRAR NUEVO USUARIO";
                btnEnviar.textContent = "Crear Cuenta";
                btnToggle.textContent = "¿Ya tenés cuenta? Iniciá sesión";
            }
        });

        // --- AUTENTICACIÓN (LOGIN / REGISTRO) ---
        document.getElementById('form-auth').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('auth-username').value;
            const password = document.getElementById('auth-password').value;
            const errorDiv = document.getElementById('auth-error');
            const btnEnviar = document.getElementById('btn-auth-enviar');
            
            errorDiv.textContent = "";
            const endpoint = modoLogin ? '/token/' : '/register/';
            
            btnEnviar.textContent = "PROCESANDO...";
            btnEnviar.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || data.username || "Error en las credenciales");
                }

                // Guardar tokens si fue login, o loguear directo si fue registro
                if (modoLogin) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    cargarAplicacion();
                } else {
                    alert("Usuario creado con éxito. Ahora iniciá sesión.");
                    modoLogin = true;
                    document.getElementById('auth-titulo').innerHTML = "<span>//</span> INICIAR SESIÓN";
                    btnEnviar.textContent = "Ingresar";
                    document.getElementById('btn-toggle-auth').textContent = "¿No tenés cuenta? Registrate acá";
                    document.getElementById('auth-password').value = "";
                }
            } catch (err) {
                errorDiv.textContent = `CRITICAL_ERR: ${err.message}`;
            } finally {
                if (modoLogin) btnEnviar.textContent = "Ingresar";
                btnEnviar.disabled = false;
            }
        });

        // --- CARGAR PANTALLA PRINCIPAL ---
        function cargarAplicacion() {
            const token = localStorage.getItem('access_token');
            if (!token) return;

            document.getElementById('seccion-auth').classList.add('oculto');
            document.getElementById('seccion-app').classList.remove('oculto');
            
            obtenerMovimientos();
        }

        // --- TRAER MOVIMIENTOS DESDE RENDER ---
        async function obtenerMovimientos() {
            const token = localStorage.getItem('access_token');
            const movError = document.getElementById('mov-error');
            
            try {
                const response = await fetch(`${API_BASE_URL}/movimientos/`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    // Token expirado, desloguear
                    logout();
                    return;
                }

                const movimientos = await response.json();
                renderizarMovimientos(movimientos);
            } catch (err) {
                movError.textContent = "ERR_NET: No se pudo conectar con el historial";
            }
        }

        // --- RENDERIZAR EN HISTORIAL (FECHA AR / GRILLA FIJA) ---
        function renderizarMovimientos(movimientos) {
            const contenedor = document.getElementById('contenedor-movimientos');
            const balanceMonto = document.getElementById('balance-monto');
            contenedor.innerHTML = "";
            
            let total = 0;

            movimientos.forEach(mov => {
                const item = document.createElement('div');
                item.className = "item-movimiento";

                // Formatear el monto y acumular al total
                const montoNum = parseFloat(mov.monto);
                let signo = "";
                let claseMonto = "";

                if (mov.tipo === 'ingreso') {
                    total += montoNum;
                    signo = "+";
                    claseMonto = "ingreso";
                } else {
                    total -= montoNum;
                    signo = "-";
                    claseMonto = "gasto";
                }

                // Formatear Fecha desde el backend (YYYY-MM-DD) a Local (DD/MM/AAAA)
                let fechaFormateada = "00/00/0000";
                if (mov.fecha) {
                    const partes = mov.fecha.split('-');
                    if (partes.length === 3) {
                        fechaFormateada = `${partes[2]}/${partes[1]}/${partes[0]}`;
                    }
                }

                item.innerHTML = `
                    <div class="desc">${mov.descripcion}</div>
                    <div class="monto ${claseMonto}">${signo}$${montoNum.toFixed(2)}</div>
                    <div class="fecha-item">${fechaFormateada}</div>
                `;
                contenedor.appendChild(item);
            });

            // Mostrar Balance final
            balanceMonto.textContent = `$${total.toFixed(2)}`;
            if (total >= 0) {
                balanceMonto.style.color = "var(--neon-verde)";
            } else {
                balanceMonto.style.color = "var(--neon-rojo)";
            }
        }

        // --- CREAR UN NUEVO MOVIMIENTO ---
        document.getElementById('form-movimiento').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const descripcion = document.getElementById('mov-descripcion').value;
            const monto = document.getElementById('mov-monto').value;
            const tipo = document.getElementById('mov-tipo').value;
            const movError = document.getElementById('mov-error');
            const btnGuardar = document.getElementById('btn-guardar-movimiento');
            const token = localStorage.getItem('access_token');

            movError.textContent = "";
            btnGuardar.textContent = "GUARDANDO...";
            btnGuardar.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/movimientos/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ descripcion, monto, tipo })
                });

                if (!response.ok) {
                    throw new Error("No se pudo procesar el movimiento en el servidor");
                }

                // Limpiar formulario y recargar lista limpia
                document.getElementById('form-movimiento').reset();
                await obtenerMovimientos();
            } catch (err) {
                movError.textContent = `ERR_WRITE: ${err.message}`;
            } finally {
                btnGuardar.textContent = "Guardar Movimiento";
                btnGuardar.disabled = false;
            }
        });

        // --- LOGOUT ---
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            document.getElementById('seccion-app').classList.add('oculto');
            document.getElementById('seccion-auth').classList.remove('oculto');
            document.getElementById('form-auth').reset();
        }
        document.getElementById('btn-logout').addEventListener('click', logout);

        // Al iniciar, chequear si ya estaba logueado
        if (localStorage.getItem('access_token')) {
            cargarAplicacion();
        }
    </script>
</body>
</html>
